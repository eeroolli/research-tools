[mypy]
# Mypy configuration for research-tools project

# Python version
python_version = 3.11

# Platform (supports both Windows and WSL)
platform = linux

# Check untyped definitions
check_untyped_defs = True

# Disallow untyped definitions (optional - can be enabled gradually)
# disallow_untyped_defs = True

# Disallow incomplete type stubs
disallow_incomplete_defs = False

# Ignore missing imports (useful for optional dependencies)
ignore_missing_imports = True

# Show error codes
show_error_codes = True

# Warn about unused ignores
warn_unused_ignores = True

# Warn about redundant casts
warn_redundant_casts = True

# Warn about unused configs
warn_unused_configs = True

# Follow imports (skip, normal, silent)
follow_imports = normal

# Namespace packages
namespace_packages = True

# Strict optional
strict_optional = True

# Show column numbers
show_column_numbers = True

# Show error context
show_error_context = True

# Color output
color_output = True

# Incremental mode
incremental = True

# Cache directory
cache_dir = .mypy_cache

[mypy-shared_tools.daemon.*]
# Daemon modules - should have type hints
check_untyped_defs = True
disallow_untyped_defs = False  # Can enable after adding type hints

[mypy-tests.*]
# Test files - less strict
check_untyped_defs = False
disallow_untyped_defs = False

[mypy-*.tests.*]
# Test modules
check_untyped_defs = False
disallow_untyped_defs = False

